version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lasin_postgres
    environment:
      POSTGRES_USER: lasin_user
      POSTGRES_PASSWORD: lasin123
      POSTGRES_DB: lasin_db
      # Forzar encoding UTF-8 en la inicialización
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - lasin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lasin_user -d lasin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lasin_pgdata: